plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - README.md
  - LICENSE.md
url: https://meta-truth.github.io
baseurl: /oaio

title: Meta-Truth
description: A machine is a thing. Things can not think. ...but some of them can thingk!

machine:
  name: Meta-Truth
  verb: seeking
  instructions_file: meta-truth.md
  token: openai
  server: https://localhost:443
  apiUrl: https://api.openai.com/v1/responses

app:
  worker_name: oaioapi.js

lm:
  model: gpt-5.4
  max_output_tokens: 100000
  reasoning_effort: high
  reasoning_summary: detailed
  temperature: 1.0

github_settings:
  owner: meta-truth
  repo: meta_truth
  file_name: machina.yaml
  branch: main
  token_file: github.txt
